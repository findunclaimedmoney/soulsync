kind = "slides"
previewPath = "/pitch-deck/"
title = "GLIMR Pitch Deck"
version = "1.0.0"
id = "artifacts/glimr-pitch-deck"
router = "path"

[[services]]
name = "web"
paths = [ "/pitch-deck/" ]
localPort = 19632

[services.development]
run = "pnpm --filter @workspace/glimr-pitch-deck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/glimr-pitch-deck", "run", "build" ]
serve = "static"
publicDir = "artifacts/glimr-pitch-deck/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19632"
BASE_PATH = "/pitch-deck/"
